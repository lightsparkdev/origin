name: "Create Release PR"

on:
  workflow_dispatch:
  # Temporary: run on PRs that modify this workflow for validation
  pull_request:
    paths:
      - ".github/workflows/release.yaml"
      - ".github/scripts/generate-changelog.mjs"

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Collect changes since last release
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Ensure tags are fetched from the upstream repo
          git fetch origin --tags

          OLD_VERSION=$(node -p "require('./package.json').version")
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $OLD_VERSION"
          echo "Tag exists: $(git tag -l v${OLD_VERSION})"
          echo "Commits since tag:"
          git log v${OLD_VERSION}..HEAD --oneline | head -20 || echo "(none)"

          # Collect PR merge commit messages since last tag
          MERGES=$(git log v${OLD_VERSION}..HEAD --merges --pretty=format:"%s" || true)

          # Fall back to non-merge commits if no merges
          if [ -z "$MERGES" ]; then
            MERGES=$(git log v${OLD_VERSION}..HEAD --pretty=format:"%s" --no-merges | head -30)
          fi

          # Extract PR numbers from merge commit messages (e.g. "(#117)")
          # and fetch their bodies for richer context
          PR_DETAILS=""
          for pr_num in $(echo "$MERGES" | grep -o '#[0-9]\+' | tr -d '#' | sort -un); do
            pr_body=$(gh pr view "$pr_num" --json title,body --jq '"### PR #" + (.title | tostring) + "\n" + .body' 2>/dev/null || true)
            if [ -n "$pr_body" ]; then
              PR_DETAILS="${PR_DETAILS}${pr_body}\n\n"
            fi
          done

          # Collect per-file diff stat for context
          DIFFSTAT=$(git diff v${OLD_VERSION}..HEAD --stat)

          # Write to env files for the next step
          {
            echo "COMMITS<<COMMITS_EOF"
            echo "$MERGES"
            echo "COMMITS_EOF"
          } >> "$GITHUB_ENV"

          {
            echo "DIFFSTAT<<DIFFSTAT_EOF"
            echo "$DIFFSTAT"
            echo "DIFFSTAT_EOF"
          } >> "$GITHUB_ENV"

          {
            echo "PR_DETAILS<<PR_DETAILS_EOF"
            echo -e "$PR_DETAILS"
            echo "PR_DETAILS_EOF"
          } >> "$GITHUB_ENV"

      - name: Determine version bump and generate changelog
        id: ai
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLD_VERSION: ${{ steps.changes.outputs.old_version }}
        run: node .github/scripts/generate-changelog.mjs

      # Skip the remaining steps on PR runs (just validate the AI step works)
      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        id: bump
        run: |
          npm version ${{ steps.ai.outputs.version_bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        if: github.event_name == 'workflow_dispatch'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          # Replace the AI's placeholder version with the actual bumped version
          sed -i "s/→ [0-9]*\.[0-9]*\.[0-9]*/→ ${NEW_VERSION}/" /tmp/changelog_entry.md

          if [ -f CHANGELOG.md ]; then
            # Insert after the title line
            {
              head -1 CHANGELOG.md
              echo ""
              cat /tmp/changelog_entry.md
              echo ""
              tail -n +2 CHANGELOG.md
            } > /tmp/CHANGELOG.md
            mv /tmp/CHANGELOG.md CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              cat /tmp/changelog_entry.md
            } > CHANGELOG.md
          fi

      - name: Create release branch and PR
        if: github.event_name == 'workflow_dispatch'
        env:
          # Use a PAT so the push and PR creation trigger CI workflows.
          # GITHUB_TOKEN events don't trigger workflows (GitHub anti-recursion).
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          OLD_VERSION="${{ steps.changes.outputs.old_version }}"
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          VERSION_BUMP="${{ steps.ai.outputs.version_bump }}"
          BRANCH="release/v${NEW_VERSION}"

          # Configure git to push with the PAT
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          git checkout -b "$BRANCH"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "v${NEW_VERSION}"
          git push -u origin "$BRANCH"

          CHANGELOG_ENTRY=$(cat /tmp/changelog_entry.md)

          gh pr create \
            --title "v${NEW_VERSION}" \
            --body "$(cat <<EOF
          ## Release v${NEW_VERSION}

          **Version bump:** ${VERSION_BUMP} (${OLD_VERSION} → ${NEW_VERSION})

          ### Changes

          ${CHANGELOG_ENTRY}

          ---

          Merging this PR will publish \`@lightsparkdev/origin@${NEW_VERSION}\` to npm.
          EOF
          )"
